<style>
  :root{
    --paper:#F7F3EC;
    --ink:#211D17;
    --rust:#B5542E;
    --rust-dark:#9A4423;
    --line:#D8CFBC;
    --card:#FAFAF8;
    --ink-soft:#5C5648;
    --max:1180px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 20px;}
  h1,h2{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;line-height:1.1;}
  .mono{font-family:'Space Mono',monospace;}

  nav{border-bottom:1px solid var(--line);}
  .navrow{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;
    max-width:var(--max);margin:0 auto;
  }
  .logo{font-family:'Fraunces',serif;font-weight:600;font-size:20px;text-decoration:none;color:var(--ink);}
  .logo span{color:var(--rust);}

  main{
    flex:1;
    display:flex;
    align-items:center;
    padding:40px 0 60px;
  }

  .error-code{
    font-family:'Space Mono',monospace;
    font-size:13px;
    color:var(--rust);
    letter-spacing:0.06em;
    margin-bottom:16px;
  }
  h1{font-size:30px;margin-bottom:14px;max-width:16ch;}
  .lead{font-size:15.5px;color:var(--ink-soft);line-height:1.6;max-width:42ch;margin-bottom:28px;}

  .card-404{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:6px;
    padding:20px;
    margin-bottom:28px;
    max-width:340px;
  }
  .card-404 .result-meta{
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin-bottom:6px;
  }
  .card-404 .result-title{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:16px;
    text-decoration:line-through;
    text-decoration-color:var(--rust);
    color:var(--ink-soft);
  }

  .btn-primary{
    display:inline-block;
    background:var(--rust);
    color:var(--paper);
    font-family:'Space Mono',monospace;
    font-size:13px;
    text-align:center;
    padding:15px 22px;
    border-radius:4px;
    border:1px solid var(--rust-dark);
    box-shadow:0 2px 0 var(--rust-dark);
    transition:transform .15s ease;
  }
  .btn-primary:active{transform:translateY(2px);box-shadow:none;}

  footer{border-top:1px solid var(--line);padding:24px 0;}
  .footer-bottom{
    font-size:11px;color:var(--ink-soft);
    font-family:'Space Mono',monospace;
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
    max-width:var(--max);margin:0 auto;padding:0 20px;
  }

  @media(min-width:860px){
    h1{font-size:40px;}
    .lead{font-size:17px;}
  }
</style>
</head>
<body>

<nav>
  <div class="navrow">
    <a href="/" class="logo">Get Presented<span>.</span></a>
  </div>
</nav>

<main>
  <div class="wrap">
    <div class="error-code mono">404 · PAGE NOT FOUND</div>
    <h1>This page didn't make it online.</h1>
    <p class="lead">The link's broken, or the page has moved. Unlike the businesses we build for, this one's genuinely not findable right now.</p>

    <div class="card-404">
      <div class="result-meta">Search result</div>
      <div class="result-title">[This page]</div>
    </div>

    <a href="/" class="btn-primary">Back to homepage →</a>
  </div>
</main>

<footer>
  <div class="footer-bottom">
    <span>Get Presented.</span>
    <span>hello@getpresented.co.uk</span>
  </div>
</footer>

</body>
</html>
